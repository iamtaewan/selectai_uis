<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Select AI Demo Studio UI Mockups</title>
  <style>
    :root {
      --brand: #C74634;
      --brand-dark: #A33A2B;
      --brand-tint: #FBEDEA;
      --neutral-0: #FFFFFF;
      --neutral-10: #FBF9F8;
      --neutral-20: #F5F4F2;
      --neutral-30: #E4E1DD;
      --neutral-40: #D4D0CB;
      --neutral-50: #ABA7A2;
      --neutral-60: #7A756F;
      --neutral-70: #4F4A45;
      --neutral-80: #312D2A;
      --neutral-90: #161513;
      --success: #2E7D32;
      --success-tint: #E8F3E8;
      --warning: #B7790A;
      --warning-tint: #FCF0DC;
      --danger: #C7402E;
      --danger-tint: #FBEDEA;
      --info: #1F6FB5;
      --info-tint: #E6F0F8;
      --running: #6B4FA0;
      --running-tint: #EFEAF7;
      --code-bg: #25221F;
      --code-text: #F5F4F2;
      --code-key: #F0A878;
      --code-str: #A8C9A0;
      --code-comment: #8A857F;
      --code-accent: #E89A8C;
      --shadow: 0 1px 2px rgba(22,21,19,.06);
      --shadow-md: 0 2px 8px rgba(22,21,19,.10);
      --font-sans: Inter, Pretendard, "Noto Sans KR", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --font-mono: "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--neutral-10); color: var(--neutral-90); font-family: var(--font-sans); }
    body { width: 100vw; overflow: hidden; }
    .page-root { width: 1440px; height: 1000px; overflow: hidden; background: var(--neutral-10); }
    .page-root.full-size { height: 1400px; }
    .shell { display: grid; grid-template-rows: 56px 1fr 34px; grid-template-columns: 240px 1fr; width: 100%; height: 100%; }
    .shell.shell-full { grid-template-rows: 56px 1fr 240px 34px; }
    .topbar { grid-column: 1 / -1; display: flex; align-items: center; gap: 18px; height: 56px; padding: 0 22px; background: var(--neutral-0); border-bottom: 1px solid var(--neutral-30); }
    .mark { width: 26px; height: 26px; border-radius: 6px; background: var(--brand); box-shadow: inset 0 -7px 0 rgba(0,0,0,.12); }
    .brand { display: flex; align-items: center; gap: 10px; min-width: 260px; font-weight: 700; letter-spacing: 0; }
    .top-spacer { flex: 1; }
    .top-pill { display: inline-flex; align-items: center; gap: 8px; height: 32px; padding: 0 12px; border: 1px solid var(--neutral-30); border-radius: 999px; background: var(--neutral-0); font-size: 13px; color: var(--neutral-70); }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); display: inline-block; }
    .dot.warn { background: var(--warning); }
    .dot.danger { background: var(--danger); }
    .sidebar { grid-row: 2; background: var(--neutral-20); border-right: 1px solid var(--neutral-30); padding: 20px 14px 12px; overflow: hidden; }
    .shell-full .sidebar { grid-row: 2 / 4; }
    .nav-group { color: var(--neutral-60); font-size: 12px; font-weight: 700; margin: 14px 10px 8px; letter-spacing: .02em; }
    .nav-item { height: 36px; display: flex; align-items: center; gap: 9px; padding: 0 10px; border-radius: 6px; color: var(--neutral-70); font-size: 14px; margin-bottom: 4px; }
    .nav-item.active { background: var(--brand-tint); color: var(--neutral-90); font-weight: 700; border-left: 3px solid var(--brand); padding-left: 7px; }
    .step { width: 20px; height: 20px; border-radius: 50%; display: grid; place-items: center; border: 1px solid var(--neutral-40); color: var(--neutral-60); font-size: 11px; background: var(--neutral-0); }
    .active .step { border-color: var(--brand); color: var(--brand-dark); }
    .main { grid-column: 2; grid-row: 2; padding: 22px 28px 18px; overflow: hidden; }
    .footer { grid-column: 1 / -1; grid-row: 3; display: flex; align-items: center; gap: 20px; height: 34px; padding: 0 20px; border-top: 1px solid var(--neutral-30); background: var(--neutral-0); color: var(--neutral-60); font-size: 12px; }
    .shell-full .footer { grid-row: 4; }
    .footer .on { color: var(--success); font-weight: 700; }
    .page-title { display: flex; align-items: flex-start; justify-content: space-between; gap: 24px; margin-bottom: 16px; }
    h1 { margin: 0 0 5px; font-size: 28px; line-height: 1.25; letter-spacing: 0; }
    h2 { margin: 0 0 12px; font-size: 18px; line-height: 1.3; }
    h3 { margin: 0 0 8px; font-size: 15px; line-height: 1.3; }
    p { margin: 0; line-height: 1.52; }
    .subtle { color: var(--neutral-60); font-size: 13px; line-height: 1.5; }
    .small { font-size: 12px; color: var(--neutral-60); }
    .muted { color: var(--neutral-60); }
    .grid { display: grid; gap: 16px; }
    .cols-2 { grid-template-columns: 1fr 1fr; }
    .cols-3 { grid-template-columns: repeat(3, 1fr); }
    .cols-4 { grid-template-columns: repeat(4, 1fr); }
    .span-2 { grid-column: span 2; }
    .panel { background: var(--neutral-0); border: 1px solid var(--neutral-30); border-radius: 8px; box-shadow: var(--shadow); padding: 18px; overflow: hidden; }
    .panel.tight { padding: 14px; }
    .panel.soft { background: var(--neutral-20); }
    .panel.info { background: var(--info-tint); border-color: transparent; }
    .panel.warn { background: var(--warning-tint); border-color: transparent; }
    .panel.danger { background: var(--danger-tint); border-color: transparent; }
    .panel.success { background: var(--success-tint); border-color: transparent; }
    .split { display: grid; grid-template-columns: 54% 1fr; gap: 16px; }
    .badge { display: inline-flex; align-items: center; gap: 6px; min-height: 24px; padding: 2px 9px; border-radius: 999px; font-size: 12px; font-weight: 700; white-space: nowrap; }
    .badge.success { background: var(--success-tint); color: var(--success); }
    .badge.warn { background: var(--warning-tint); color: var(--warning); }
    .badge.danger { background: var(--danger-tint); color: var(--danger); }
    .badge.info { background: var(--info-tint); color: var(--info); }
    .badge.neutral { background: var(--neutral-20); color: var(--neutral-70); border: 1px solid var(--neutral-30); }
    .btn { height: 36px; padding: 0 14px; border: 1px solid var(--neutral-40); border-radius: 6px; background: var(--neutral-0); color: var(--neutral-90); font: 700 13px var(--font-sans); display: inline-flex; align-items: center; justify-content: center; gap: 8px; white-space: nowrap; }
    .btn.primary { background: var(--neutral-90); color: var(--neutral-0); border-color: var(--neutral-90); }
    .btn.danger { background: var(--danger); color: var(--neutral-0); border-color: var(--danger); }
    .btn.ghost { background: transparent; border-color: transparent; color: var(--info); }
    .btn.small { height: 30px; padding: 0 10px; font-size: 12px; }
    .input, .select { height: 36px; border: 1px solid var(--neutral-40); border-radius: 4px; padding: 0 11px; background: var(--neutral-0); color: var(--neutral-90); font-size: 13px; width: 100%; }
    .textarea { min-height: 72px; border: 1px solid var(--neutral-40); border-radius: 4px; padding: 10px 11px; background: var(--neutral-0); color: var(--neutral-90); font-size: 13px; width: 100%; resize: none; font-family: var(--font-sans); }
    .field { display: grid; gap: 5px; }
    .field label { font-size: 12px; color: var(--neutral-70); font-weight: 700; }
    .row { display: flex; align-items: center; gap: 10px; }
    .row.between { justify-content: space-between; }
    .stack { display: grid; gap: 12px; }
    .code { background: var(--code-bg); color: var(--code-text); border-radius: 8px; padding: 13px 14px; font: 12px/1.55 var(--font-mono); white-space: pre-wrap; overflow: hidden; }
    .code .key { color: var(--code-key); }
    .code .str { color: var(--code-str); }
    .sql-terminal { display: none; grid-column: 2; grid-row: 3; background: var(--code-bg); color: var(--code-text); border-top: 1px solid var(--neutral-40); overflow: hidden; }
    .shell-full .sql-terminal { display: block; }
    .terminal-head { height: 32px; display: flex; align-items: center; gap: 10px; padding: 0 12px; background: var(--neutral-80); border-top: 1px solid rgba(255,255,255,.08); font: 700 12px var(--font-sans); letter-spacing: .08em; }
    .terminal-count { letter-spacing: 0; border-radius: 999px; padding: 2px 8px; background: rgba(255,255,255,.12); color: var(--code-text); font-size: 11px; }
    .terminal-actions { margin-left: auto; display: flex; gap: 8px; color: var(--neutral-30); letter-spacing: 0; font-weight: 600; }
    .terminal-body { height: 208px; padding: 10px 14px; font: 12px/1.55 var(--font-mono); overflow: hidden; }
    .log-line { display: grid; grid-template-columns: 78px 118px 1fr 70px; gap: 10px; min-height: 24px; align-items: start; border-left: 2px solid transparent; padding-left: 8px; }
    .log-line.error { border-left-color: var(--danger); }
    .log-time, .log-latency { color: var(--code-comment); }
    .log-tag { color: var(--code-accent); }
    .log-sql .key { color: var(--code-key); }
    .log-sql .str { color: var(--code-str); }
    .table { width: 100%; border-collapse: collapse; font-size: 12.5px; table-layout: fixed; }
    .table th { text-align: left; background: var(--neutral-20); color: var(--neutral-70); font-weight: 700; border-bottom: 1px solid var(--neutral-30); padding: 8px 9px; }
    .table td { border-bottom: 1px solid var(--neutral-30); padding: 8px 9px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--neutral-30); margin-bottom: 14px; }
    .tab { padding: 10px 13px 8px; font-size: 13px; color: var(--neutral-60); border-bottom: 3px solid transparent; }
    .tab.active { color: var(--neutral-90); border-color: var(--brand); font-weight: 800; }
    .tab code { font-family: var(--font-mono); font-size: 12px; }
    .chip-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip { display: inline-flex; align-items: center; gap: 6px; min-height: 30px; padding: 0 11px; border-radius: 999px; border: 1px solid var(--neutral-30); background: var(--neutral-0); font-size: 12.5px; color: var(--neutral-70); }
    .chip.selected { background: var(--brand-tint); border-color: #efc9c1; color: var(--neutral-90); font-weight: 700; }
    .dropzone { height: 132px; border: 2px dashed var(--neutral-40); border-radius: 8px; background: var(--neutral-20); display: grid; place-items: center; text-align: center; padding: 16px; }
    .meter { height: 8px; border-radius: 999px; background: var(--neutral-30); overflow: hidden; }
    .meter span { display: block; height: 100%; background: var(--success); border-radius: inherit; }
    .status-list { display: grid; gap: 10px; }
    .status-item { display: grid; grid-template-columns: 28px 1fr auto; align-items: start; gap: 10px; padding: 11px; border: 1px solid var(--neutral-30); border-radius: 8px; background: var(--neutral-0); }
    .status-icon { width: 24px; height: 24px; border-radius: 50%; display: grid; place-items: center; font-size: 12px; font-weight: 900; }
    .status-icon.success { background: var(--success-tint); color: var(--success); }
    .status-icon.warn { background: var(--warning-tint); color: var(--warning); }
    .status-icon.danger { background: var(--danger-tint); color: var(--danger); }
    .status-icon.neutral { background: var(--neutral-20); color: var(--neutral-60); }
    .timeline { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
    .journey-step { border: 1px solid var(--neutral-30); background: var(--neutral-0); border-radius: 8px; padding: 11px; min-height: 82px; }
    .journey-step .num { width: 22px; height: 22px; border-radius: 50%; display: grid; place-items: center; background: var(--brand-tint); color: var(--brand-dark); font-weight: 800; font-size: 12px; margin-bottom: 7px; }
    .phone-note { display: none; }
    .metric { display: grid; gap: 4px; }
    .metric strong { font-size: 26px; line-height: 1.1; }
    .compare-card { border-top: 3px solid var(--warning); }
    .compare-card.good { border-top-color: var(--success); }
    .avatar { width: 30px; height: 30px; border-radius: 50%; display: grid; place-items: center; background: var(--brand-tint); color: var(--brand-dark); font-weight: 800; font-size: 12px; flex: 0 0 auto; }
    .message { display: flex; gap: 9px; align-items: flex-start; }
    .bubble { border: 1px solid var(--neutral-30); background: var(--neutral-0); border-radius: 8px; padding: 10px 12px; font-size: 13px; line-height: 1.48; max-width: 92%; }
    .message.user { justify-content: flex-end; }
    .message.user .bubble { background: var(--neutral-80); color: var(--neutral-0); border-color: var(--neutral-80); }
    .heat { height: 42px; border-radius: 6px; display: grid; place-items: center; font-weight: 800; font-size: 12px; }
    .heat.good { background: var(--success-tint); color: var(--success); }
    .heat.warn { background: var(--warning-tint); color: var(--warning); }
    .heat.bad { background: var(--danger-tint); color: var(--danger); }
    .onboarding { width: 100%; height: 100%; padding: 40px 56px; background: var(--neutral-10); }
    .onboarding .top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
    .hero { display: grid; grid-template-columns: 1fr 420px; gap: 34px; align-items: stretch; }
    .hero h1 { font-size: 42px; max-width: 720px; margin-bottom: 14px; }
    .hero .lead { font-size: 18px; color: var(--neutral-70); max-width: 700px; line-height: 1.55; }
    .hero-panel { background: var(--neutral-0); border: 1px solid var(--neutral-30); border-radius: 8px; padding: 24px; box-shadow: var(--shadow-md); }
    .value-card { min-height: 150px; padding: 18px; border: 1px solid var(--neutral-30); border-radius: 8px; background: var(--neutral-0); }
    .value-card .big { font-size: 30px; font-weight: 800; color: var(--brand-dark); margin-bottom: 10px; }
    .expert-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-top: 24px; }
    .expert-card { padding: 12px; background: var(--neutral-0); border: 1px solid var(--neutral-30); border-radius: 8px; min-height: 88px; }
    .expert-card strong { display: block; font-size: 12px; margin-bottom: 5px; }
    .expert-card span { color: var(--neutral-60); font-size: 11px; line-height: 1.35; display: block; }

    @media (max-width: 700px) {
      body { overflow: auto; }
      .page-root { width: 100vw; height: auto; min-height: 100vh; overflow: visible; }
      .shell { display: block; }
      .topbar { position: sticky; top: 0; z-index: 2; }
      .brand { min-width: 0; }
      .top-pill:nth-of-type(n+2), .sidebar, .footer { display: none; }
      .main { padding: 16px; overflow: visible; }
      .page-title { display: grid; }
      .grid, .cols-2, .cols-3, .cols-4, .split, .hero, .timeline, .expert-grid { grid-template-columns: 1fr; }
      .span-2 { grid-column: auto; }
      .onboarding { padding: 24px 18px; }
      .hero h1 { font-size: 32px; }
      .phone-note { display: block; }
    }
  </style>
</head>
<body>
  <div id="app" class="page-root"></div>
  <script>
    const params = new URLSearchParams(location.search);
    const pageParam = params.get("page") || "PG-00";
    const isFullSize = params.get("full") === "1";
    if (isFullSize) document.getElementById("app").classList.add("full-size");
    const nav = [
      ["준비하기", [
        ["PG-01", "커넥션"], ["PG-02", "권한 점검"], ["PG-03", "프로파일"]
      ]],
      ["시연하기", [
        ["PG-04", "플레이그라운드"], ["PG-05", "챗봇"], ["PG-06", "증강 비교"]
      ]],
      ["기타", [
        ["PG-07", "대시보드"], ["PG-08", "설정"]
      ]]
    ];
    const pageNames = {
      "PG-00": "온보딩", "PG-01": "커넥션 관리", "PG-02": "권한 사전 점검",
      "PG-03": "프로파일 목록", "PG-03a": "프로파일 생성", "PG-03b": "프로파일 상세",
      "PG-04": "플레이그라운드", "PG-05": "챗봇", "PG-05a": "대화 이력",
      "PG-06": "증강 비교", "PG-07": "대시보드", "PG-08": "설정"
    };

    function badge(text, kind="neutral") { return `<span class="badge ${kind}">${text}</span>`; }
    function sql(text) {
      return `<div class="code">${text
        .replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;")
        .replace(/(SELECT|BEGIN|END|FROM|WHERE|GROUP BY|ORDER BY|GRANT|EXEC|DECLARE|COMMENT ON|TABLE|COLUMN|AS|TO|IS|INTO)/g, '<span class="key">$1</span>')
        .replace(/('[^']*')/g, '<span class="str">$1</span>')}</div>`;
    }
    function title(name, desc, actions="") {
      return `<div class="page-title"><div><h1>${name}</h1><p class="subtle">${desc}</p></div><div class="row">${actions}</div></div>`;
    }
    function logSql(text) {
      return text
        .replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;")
        .replace(/(SELECT|BEGIN|END|FROM|WHERE|GROUP BY|ORDER BY|GRANT|EXEC|DECLARE|COMMENT ON|TABLE|COLUMN|AS|TO|IS|INTO|UPDATE|DELETE|POST|GET)/g, '<span class="key">$1</span>')
        .replace(/('[^']*')/g, '<span class="str">$1</span>');
    }
    function sqlTerminal(active) {
      const samples = {
        "PG-01": [["10:58:01","connections","POST /api/v1/connections/wallet","120ms"],["10:58:04","connections","SELECT banner_full FROM v$version WHERE ROWNUM = 1","420ms"]],
        "PG-02": [["10:59:11","permissions","BEGIN DBMS_CLOUD_ADMIN.ENABLE_PRINCIPAL_AUTH(provider => 'OCI'); END;","880ms"],["10:59:12","permissions","SELECT table_name, privilege FROM DBA_TAB_PRIVS WHERE table_name = 'DBMS_CLOUD_AI'","62ms"]],
        "PG-03": [["11:00:20","profiles","SELECT profile_name FROM USER_CLOUD_AI_PROFILES ORDER BY profile_name","75ms"],["11:00:23","profiles","SELECT attribute_name, attribute_value FROM USER_CLOUD_AI_PROFILE_ATTRIBUTES","90ms"]],
        "PG-04": [["11:01:02","playground","SELECT DBMS_CLOUD_AI.GENERATE(prompt => :prompt, profile_name => 'GENAI_SH', action => 'runsql') FROM dual","2840ms"],["11:01:05","readonly","SELECT c.cust_city, COUNT(*) AS customer_count FROM sh.customers c GROUP BY c.cust_city","310ms"],["11:01:08","error","ORA-00904 GENERATED_SQL_INVALID comments 증강 또는 재시도를 제안","retry"]],
        "PG-05": [["11:02:15","chat","BEGIN v_id := DBMS_CLOUD_AI.CREATE_CONVERSATION(attributes => :json); END;","460ms"],["11:02:18","chat","SELECT DBMS_CLOUD_AI.GENERATE(prompt => :prompt, action => 'narrate', params => :params_json) FROM dual","3020ms"]],
        "PG-06": [["11:03:40","enrichment","COMMENT ON COLUMN table2.c7 IS 'number of views, watched, streamed'","95ms"],["11:03:43","compare","SELECT DBMS_CLOUD_AI.GENERATE(prompt => :prompt, profile_name => 'ENRICH_DEMO_ON') FROM dual","3910ms"]],
        "PG-07": [["11:04:12","dashboard","GET /api/v1/dashboard/health","118ms"],["11:04:13","dashboard","SELECT 1 FROM dual","24ms"]],
        "PG-08": [["11:05:00","settings","EXEC DBMS_CLOUD_AI.DROP_CONVERSATION(:conversation_id)","preview"],["11:05:02","settings","EXEC DBMS_CLOUD.CREATE_CREDENTIAL(private_key => '***MASKED***')","preview"]]
      };
      const rows = samples[active] || samples["PG-04"];
      return `<section class="sql-terminal">
        <div class="terminal-head"><span>SQL LOG</span><span class="terminal-count">${rows.length}</span><div class="terminal-actions"><span>지우기</span><span>복사</span><span>최대화</span><span>닫기</span></div></div>
        <div class="terminal-body">
          ${rows.map((r) => `<div class="log-line ${r[1] === "error" ? "error" : ""}"><span class="log-time">[${r[0]}]</span><span class="log-tag">${r[1]}</span><span class="log-sql">${logSql(r[2])}</span><span class="log-latency">${r[3]}</span></div>`).join("")}
          <div class="log-line"><span class="log-time">[대기]</span><span class="log-tag">viewer</span><span class="log-sql">패널은 닫혀 있어도 기록을 누적하며 새 로그가 화면을 자동으로 열지 않습니다.</span><span class="log-latency">ready</span></div>
        </div>
      </section>`;
    }
    function shell(content, active) {
      const sidebar = nav.map(([group, items]) => `
        <div class="nav-group">${group}</div>
        ${items.map(([id, label], i) => `<div class="nav-item ${active === id ? "active" : ""}"><span class="step">${i + 1}</span><span>${label}</span></div>`).join("")}
      `).join("");
      return `<div class="shell ${isFullSize ? "shell-full" : ""}">
        <header class="topbar">
          <div class="brand"><span class="mark"></span><span>Select AI Demo Studio</span></div>
          <span class="top-pill"><span class="dot"></span> demo-adb-26ai / ADMIN</span>
          <span class="top-pill">기본 프로파일 GENAI_SH</span>
          <span class="top-pill"><span class="dot warn"></span> 건강 4/5 통과</span>
          <div class="top-spacer"></div>
          <span class="top-pill">전문가 모드</span>
        </header>
        <aside class="sidebar">${sidebar}</aside>
        <main class="main">${content}</main>
        ${sqlTerminal(active)}
        <footer class="footer"><span>SQL 투명 모드 <span class="on">켜짐</span></span><span>단순 모드와 전문가 모드는 화면 밀도와 SQL 노출 기본값을 조절합니다.</span><span style="margin-left:auto">v1.0 UI concept</span></footer>
      </div>`;
    }

    function onboarding() {
      return `<div class="onboarding">
        <div class="top"><div class="brand"><span class="mark"></span><span>Select AI Demo Studio</span></div>${badge("Oracle Redwood UI concept", "neutral")}</div>

            ${sql("SELECT DBMS_CLOUD_AI.GENERATE(\n  prompt => :prompt,\n  profile_name => 'GENAI_SH',\n  action => 'runsql',\n  params => '{\"row_limit\":100}') AS response\nFROM dual;")}
            <h2>생성 SQL 검토</h2>
            ${sql("SELECT c.cust_city, c.cust_marital_status, COUNT(*) AS customer_count\n  FROM sh.customers c\n WHERE UPPER(c.cust_city) = UPPER('San Francisco')\n   AND UPPER(c.cust_marital_status) = UPPER('Married')\n GROUP BY c.cust_city, c.cust_marital_status;")}
            <div class="panel info tight"><strong>읽기 전용 게이트</strong><p class="subtle">자동 실행은 SELECT 단일문만 허용합니다. DDL/DML 감지 시 확인 단계로 전환합니다.</p></div>
          </aside>
        </div>`, "PG-04");
    }

    function chat() {
      return shell(`${title("챗봇 / Conversations", "DB 대화 ID를 명시 전달해 멀티턴 맥락을 유지합니다.", `<button class="btn">맥락 비교</button><button class="btn primary">새 대화</button>`)}
        <div class="grid" style="grid-template-columns: 62% 38%;">
          <section class="panel stack">
            <div class="row between"><div>${badge("conversation_id conv_30C9...B92", "info")} ${badge("retention 7일", "neutral")}</div><select class="select" style="width:160px"><option>narrate</option><option>runsql</option><option>chat</option></select></div>
            <div class="message user"><div class="bubble">what are the total number of customers</div></div>
            <div class="message"><div class="avatar">AI</div><div class="bubble">현재 프로파일의 고객 테이블 기준 전체 고객 수는 55,500명입니다.</div></div>
            <div class="message user"><div class="bubble">break out count of customers by country</div></div>
            <div class="message"><div class="avatar">AI</div><div class="bubble">이전 질문의 고객 수 맥락을 유지해 국가별 고객 수를 집계했습니다. United States 18,420명, Germany 8,110명, Korea 7,930명입니다.</div></div>
            <div class="grid cols-2">
              <div class="field"><label>메시지 입력</label><input class="input" value="top 5 customers by purchases with rank"></div>
              <button class="btn primary" style="align-self:end">보내기</button>
            </div>
          </section>
          <aside class="panel stack">
            <h2>대화 생성 및 실행 SQL</h2>
            ${sql("DECLARE\n  v_conversation_id VARCHAR2(64);\nBEGIN\n  v_conversation_id := DBMS_CLOUD_AI.CREATE_CONVERSATION(\n    attributes => '{\"title\":\"Customer demo\",\"retention_days\":7,\"conversation_length\":10}');\nEND;\n/")}
            ${sql("SELECT DBMS_CLOUD_AI.GENERATE(\n  prompt => :prompt,\n  profile_name => 'GENAI_SH',\n  action => 'narrate',\n  params => '{\"conversation_id\":\"conv_30C9...B92\"}') AS response\nFROM dual;")}
            <div class="panel warn tight"><strong>데이터 잔존 안내</strong><p class="subtle">대화 프롬프트와 응답은 DB 대화 이력 뷰에 남을 수 있으므로 데모 후 정리 대상입니다.</p></div>
          </aside>
        </div>`, "PG-05");
    }

    function chatHistory() {
      return shell(`${title("대화 목록/이력 관리", "대화 retention, conversation_length, 턴 이력, 삭제를 운영 화면으로 정리합니다.", `<button class="btn">새로고침</button><button class="btn danger">선택 삭제</button>`)}
        <div class="grid cols-3">
          <section class="panel span-2 stack">
            <table class="table"><thead><tr><th>대화</th><th>제목</th><th>retention_days</th><th>conversation_length</th><th>최근 턴</th><th>상태</th></tr></thead><tbody>
              <tr><td>conv_30C9...B92</td><td>Customer demo</td><td>7</td><td>10</td><td>3</td><td>활성</td></tr>
              <tr><td>conv_812A...E21</td><td>Executive quick demo</td><td>3</td><td>6</td><td>5</td><td>완료</td></tr>
              <tr><td>conv_54DF...A77</td><td>Enrichment rehearsal</td><td>1</td><td>4</td><td>2</td><td>정리 필요</td></tr>
            </tbody></table>
            <div class="panel info tight"><strong>조회 뷰</strong><p class="subtle">USER_CLOUD_AI_CONVERSATIONS와 USER_CLOUD_AI_CONVERSATION_PROMPTS를 사용합니다.</p></div>
          </section>
          <aside class="panel stack">
            <h2>선택 대화 턴 이력</h2>
            <div class="status-list">
              <div class="status-item"><div class="status-icon success">1</div><div><strong>전체 고객 수</strong><p class="subtle">응답 55,500명 / 1,980 ms</p></div>${badge("narrate", "neutral")}</div>
              <div class="status-item"><div class="status-icon success">2</div><div><strong>국가별로 나눠줘</strong><p class="subtle">이전 고객 수 맥락 유지</p></div>${badge("narrate", "neutral")}</div>
              <div class="status-item"><div class="status-icon warn">3</div><div><strong>상위 5명 순위</strong><p class="subtle">생성 SQL 검토 권장</p></div>${badge("runsql", "warn")}</div>
            </div>
            ${sql("EXEC DBMS_CLOUD_AI.DROP_CONVERSATION('conv_30C9...B92');")}
          </aside>
        </div>`, "PG-05");
    }

    function enrichment() {
      return shell(`${title("Comment 증강 전/후 비교", "모호 컬럼 스키마에서 comments off/on 프로파일을 나란히 실행해 정확도 차이를 입증합니다.", `<button class="btn">모호 스키마 생성</button><button class="btn primary">전/후 비교 실행</button>`)}
        <div class="grid cols-2">
          <section class="panel compare-card stack">
            <div class="row between"><h2>전: comments off</h2>${badge("ENRICH_DEMO_OFF", "warn")}</div>
            <p class="subtle">질문: what are our total views</p>
            ${sql("SELECT t1.c2, COUNT(t2.c1) AS total_views\n  FROM table1 t1 JOIN table2 t2 ON t1.c1 = t2.c1\n GROUP BY t1.c2;")}
            <table class="table"><thead><tr><th>C2</th><th>TOTAL_VIEWS</th><th>판정</th></tr></thead><tbody><tr><td>Movie A</td><td>4</td><td>시청 수가 아닌 행 수</td></tr><tr><td>Movie B</td><td>3</td><td>오답 가능</td></tr></tbody></table>
            <div class="panel warn tight"><strong>왜 틀렸나</strong><p class="subtle">c7이 시청 횟수라는 의미를 스키마만 보고 알 수 없습니다.</p></div>
          </section>
          <section class="panel compare-card good stack">
            <div class="row between"><h2>후: comments on</h2>${badge("ENRICH_DEMO_ON", "success")}</div>
            <p class="subtle">COMMENT 적용 후 동일 질문 재실행</p>
            ${sql("SELECT SUM(t2.c7) AS total_views\n  FROM table2 t2;")}
            <table class="table"><thead><tr><th>TOTAL_VIEWS</th><th>근거 컬럼</th><th>판정</th></tr></thead><tbody><tr><td>1,482,910</td><td>TABLE2.C7</td><td>정답</td></tr></tbody></table>
            <div class="panel success tight"><strong>모델 교체 없음</strong><p class="subtle">테이블과 컬럼 COMMENT만 LLM 메타데이터에 포함했습니다.</p></div>
          </section>
          <section class="panel span-2">
            <div class="grid cols-3">
              <div class="field"><label>TABLE2.C7 comment</label><input class="input" value="number of views, watched, streamed"></div>
              <div class="field"><label>TABLE1.C1 comment</label><input class="input" value="movie ids. Use this column to join"></div>
              <div class="field"><label>프로파일 쌍</label><input class="input" value="ENRICH_DEMO_OFF / ENRICH_DEMO_ON"></div>
            </div>
            <div style="margin-top:12px">${sql("COMMENT ON COLUMN table2.c7 IS 'number of views, watched, streamed';\nCOMMENT ON TABLE table1 IS 'Contains movies, movie titles and release year';")}</div>
          </section>
        </div>`, "PG-06");
    }

    function dashboard() {
      return shell(`${title("데모 상태 대시보드", "시연자가 지금 바로 데모 가능한지 커넥션, 권한, 프로파일, 스키마를 신호등으로 확인합니다.", `<button class="btn">헬스 체크</button><button class="btn primary">시연 시작</button>`)}
        <div class="grid cols-4">
          <div class="panel metric success"><span class="small">데모 준비</span><strong>주의</strong><p class="subtle">1개 항목 확인 필요</p></div>
          <div class="panel metric"><span class="small">첫 응답 목표</span><strong>3분</strong><p class="subtle">저장 환경 기준</p></div>
          <div class="panel metric"><span class="small">권한 통과</span><strong>4/5</strong><p class="subtle">feedback은 P1</p></div>
          <div class="panel metric"><span class="small">최근 응답</span><strong>2.8s</strong><p class="subtle">GENAI_SH</p></div>
          <section class="panel span-2 stack">
            <h2>건강 신호등</h2>
            <div class="grid cols-3">
              <div class="heat good">커넥션 정상</div><div class="heat good">EXECUTE 권한</div><div class="heat good">Data Access 활성</div>
              <div class="heat warn">Resource Principal 확인</div><div class="heat good">기본 프로파일</div><div class="heat good">데모 스키마</div>
            </div>
            <div class="timeline">
              <div class="journey-step"><div class="num">1</div><strong>커넥션</strong><p class="small">저장 사용</p></div>
              <div class="journey-step"><div class="num">2</div><strong>권한</strong><p class="small">자동 점검</p></div>
              <div class="journey-step"><div class="num">3</div><strong>프로파일</strong><p class="small">GENAI_SH</p></div>
              <div class="journey-step"><div class="num">4</div><strong>액션</strong><p class="small">질문 실행</p></div>
              <div class="journey-step"><div class="num">5</div><strong>챗봇</strong><p class="small">맥락 유지</p></div>
              <div class="journey-step"><div class="num">6</div><strong>증강</strong><p class="small">전/후 비교</p></div>
            </div>
          </section>
          <aside class="panel span-2 stack">
            <h2>주의 항목</h2>
            <div class="panel warn tight"><strong>Resource Principal 정책 수동 확인</strong><p class="subtle">DB 내부 활성화는 완료됐지만 OCI Dynamic Group 정책은 테넌시에서 확인해야 합니다.</p></div>
            <div class="panel info tight"><strong>시연 가능 판단</strong><p class="subtle">플레이그라운드와 챗봇 데모는 진행 가능. 외부 공급자 또는 feedback 시연 전 추가 점검이 필요합니다.</p></div>
            ${sql("GET /api/v1/dashboard/health\nX-Connection-Id: conn_8f2a1c")}
          </aside>
        </div>`, "PG-07");
    }

    function settings() {
      return shell(`${title("앱 설정", "기본 프로파일, 화면 모드, SQL 투명성, 데모 스키마, 보안 정리를 관리합니다.", `<button class="btn">변경 취소</button><button class="btn primary">저장</button>`)}
        <div class="grid cols-3">
          <section class="panel stack">
            <h2>기본값</h2>
            <div class="field"><label>기본 커넥션</label><select class="select"><option>demo-adb-26ai</option></select></div>
            <div class="field"><label>기본 프로파일</label><select class="select"><option>GENAI_SH</option></select></div>
            <div class="field"><label>기본 액션</label><select class="select"><option>runsql</option><option>narrate</option></select></div>
          </section>
          <section class="panel stack">
            <h2>화면 모드</h2>
            <div class="panel success tight"><div class="row between"><strong>SQL 투명 모드</strong>${badge("켜짐", "success")}</div><p class="subtle">실행 SQL 패널을 기본 펼침으로 표시합니다.</p></div>
            <div class="panel tight"><div class="row between"><strong>전문가 모드</strong>${badge("선택됨", "neutral")}</div><p class="subtle">속성 폼, JSON 직접 입력, latency를 표시합니다.</p></div>
          </section>
          <section class="panel stack">
            <h2>데모 스키마</h2>
            <div class="status-item"><div class="status-icon success">OK</div><div><strong>SH</strong><p class="subtle">추천 질문 사용 가능</p></div>${badge("준비", "success")}</div>
            <div class="status-item"><div class="status-icon success">OK</div><div><strong>TABLE1/2/3</strong><p class="subtle">증강 비교 스키마</p></div>${badge("준비", "success")}</div>
            <button class="btn">데모 스키마 초기화</button>
          </section>
          <section class="panel span-2 stack">
            <h2>보안 정리 체크리스트</h2>
            <div class="grid cols-2">
              <div class="panel tight"><strong>대화 이력 삭제</strong><p class="subtle">DROP_CONVERSATION 대상 3건</p></div>
              <div class="panel tight"><strong>프로파일 삭제</strong><p class="subtle">앱 생성 프로파일 3건</p></div>
              <div class="panel tight"><strong>wallet 정리</strong><p class="subtle">커넥션 삭제 시 해제 디렉토리 제거</p></div>
              <div class="panel tight"><strong>Data Access 원복</strong><p class="subtle">데모 이전 상태로 복원</p></div>
            </div>
          </section>
          <aside class="panel stack">
            <h2>마스킹 정책</h2>
            <p class="subtle">비밀번호, wallet 비밀번호, private key, 외부 API key는 미리보기와 로그에 평문으로 표시하지 않습니다.</p>
            ${sql("EXEC DBMS_CLOUD.CREATE_CREDENTIAL(\n  credential_name => 'GENAI_CRED',\n  private_key => '***MASKED***',\n  fingerprint => '***MASKED***');")}
          </aside>
        </div>`, "PG-08");
    }

    const pages = {
      "PG-00": onboarding,
      "PG-01": connections,
      "PG-02": permissions,
      "PG-03": profiles,
      "PG-03a": profileEditor,
      "PG-03b": profileDetail,
      "PG-04": playground,
      "PG-05": chat,
      "PG-05a": chatHistory,
      "PG-06": enrichment,
      "PG-07": dashboard,
      "PG-08": settings
    };
    document.getElementById("app").innerHTML = (pages[pageParam] || onboarding)();
  </script>
</body>
</html>
